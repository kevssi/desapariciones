<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  
  <!-- Circulo interior -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
  
  <!-- Icono: Pin con corazón y persona -->
  <g transform="translate(100, 100)">
    <!-- Pin base grande -->
    <path d="M -20 -25 Q -28 -12 -28 5 Q -28 25 0 50 Q 28 25 28 5 Q 28 -12 20 -25 Z" fill="#FFFFFF" opacity="0.95"/>
    
    <!-- Corazón dentro -->
    <path d="M -8 -10 Q -12 -15 -16 -15 Q -20 -15 -20 -11 Q -20 -6 0 8 Q 20 -6 20 -11 Q 20 -15 16 -15 Q 12 -15 8 -10" fill="#2b7d9e"/>
    
    <!-- Persona en el corazón -->
    <circle cx="0" cy="-8" r="4" fill="#2b7d9e"/>
    <path d="M -3 0 L 3 0 L 2 4 L -2 4 Z" fill="#2b7d9e"/>
  </g>
  
  <!-- Destellos grandes -->
  <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <!-- Superior izquierda -->
    <line x1="40" y1="20" x2="40" y2="5"/>
    <line x1="25" y1="35" x2="10" y2="20"/>
    
    <!-- Superior derecha -->
    <line x1="160" y1="20" x2="160" y2="5"/>
    <line x1="175" y1="35" x2="190" y2="20"/>
  </g>
  
  <!-- Puntos de destello -->
  <g fill="#FFFFFF" opacity="0.8">
    <circle cx="55" cy="40" r="2.5"/>
    <circle cx="145" cy="40" r="2.5"/>
    <circle cx="50" cy="65" r="1.5"/>
    <circle cx="150" cy="65" r="1.5"/>
  </g>
  
  <!-- Ondas/movimiento -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M -25 85 Q -12 78 0 85" transform="translate(100, 0)"/>
    <path d="M -30 100 Q -15 92 0 100" transform="translate(100, 0)"/>
    <path d="M 25 85 Q 12 78 0 85" transform="translate(100, 0)"/>
    <path d="M 30 100 Q 15 92 0 100" transform="translate(100, 0)"/>
  </g>
</svg>